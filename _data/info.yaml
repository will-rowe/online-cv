publications:
  title: "Software, Papers & Funding"
  slug: "publications"

  software:
    title: "Software"
    introduction: |
      All of my software is open sourced and available via my [GitHub](https://github.com/will-rowe) repositories.
      My software is actively maintained, with strong community engagement in the form of GitHub issues, project
      forking and pull requests. My software is also packaged for Conda, Brew and BaseSpace. I also contribute to 
      open source projects such as [ARTIC Network](https://github.com/artic-network/), BioConda, JOSS and HiPy.

      Here are my current GitHub stats and a selection of my most recent projects:

